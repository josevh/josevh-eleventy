<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager</title>

  </head>
  <body>
    <!-- Include the script that builds the page and powers Sveltia CMS -->
    <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>

    <script>
      // Sveltia currently has limited parity for custom editor component previews.
      // src: https://answers.netlify.com/t/adding-classes-to-images/3480/10
      CMS.registerEditorComponent({
        label: 'Image',
        id: 'image',
        fromBlock: match =>
          match && {
            image: match[1],
            alt: match[2],
            title: match[3],
            classes: match[4]
          },
        toBlock: function({image, alt, title, classes}, getAsset, fields) {
          return `<img src="${image || ''}" alt="${alt || ''}" title="${title || ''}" class="${classes || ''}"/>`
        },
        toPreview: ({ image, alt, title, classes }, getAsset, fields) => {
          return `<img src="${image}" alt="${alt}" title="${title}" class="${classes}"/>`;
        },
        pattern:  /^<img src="(.*?)" alt="(.*?)" title="(.*?)" class="(.*?)"\/>$/s,
        fields: [
          {
            label: 'Picture',
            name: 'image',
            widget: 'image',
            media_library: {
              allow_multiple: false,
            },
          },
          {
            label: 'Alt Text',
            name: 'alt',
          },
          {
            label: 'CSS Classes',
            name: 'classes'
          },
          {
            label: 'Title',
            name: 'title',
          },
        ]
      })
    </script>
  </body>
</html>
